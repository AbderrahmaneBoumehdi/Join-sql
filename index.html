<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Jointures SQL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        :root {
            --red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }

        #slideshow {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            padding: 20px;
        }

        .slide.active {
            display: flex;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slide img {
            max-width: 100%;
            max-height: 94vh;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            border: 10px solid #1e2937;
        }

        /* Navigation en haut à droite */
        .navigation {
            position: fixed;
            top: 25px;
            right: 30px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 50px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .nav-btn {
            background: transparent;
            border: 2.5px solid #64748b;
            color: #f1f5f9;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            font-size: 1.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--red);
            border-color: var(--red);
            transform: scale(1.1);
        }

        .slide-counter {
            color: #94a3b8;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 0 12px;
            min-width: 80px;
            text-align: center;
        }

        /* Barre de progression en haut */
        .progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #334155;
            z-index: 999;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, #ef4444, #22d3ee);
            transition: width 0.4s ease;
        }

        .slide-title {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            color: #ef4444;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 600;
            padding: 10px 32px;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            z-index: 10;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="slideshow">

        <!-- Diapo 1 -->
        <div class="slide active" id="slide-1">
            <div class="slide-content">
                <img id="img-1" src="jointure-1.png" alt="Les Jointures">
            </div>
        </div>

        <!-- Diapo 2 -->
        <div class="slide" id="slide-2">
            <div class="slide-content">
                <img id="img-2" src="jointure-2.png" alt="Types de Jointures">
            </div>
        </div>

        <!-- Diapo 3 -->
        <div class="slide" id="slide-3">
            <div class="slide-content">
                <img id="img-3" src="jointure-3.png" alt="Qu'est-ce qu'une jointure">
            </div>
        </div>

        <!-- Diapo 4 -->
        <div class="slide" id="slide-4">
            <div class="slide-content">
                <img id="img-4" src="jointure-4.png" alt="CROSS JOIN">
            </div>
        </div>

        <!-- Diapo 5 -->
        <div class="slide" id="slide-5">
            <div class="slide-content">
                <img id="img-5" src="jointure-5.png" alt="INNER JOIN">
            </div>
        </div>

        <!-- Diapo 6 -->
        <div class="slide" id="slide-6">
            <div class="slide-content">
                <img id="img-6" src="jointure-6.png" alt="LEFT JOIN">
            </div>
        </div>

        <!-- Diapo 7 -->
        <div class="slide" id="slide-7">
            <div class="slide-content">
                <img id="img-7" src="jointure-7.png" alt="RIGHT JOIN">
            </div>
        </div>

        <!-- Diapo 8 -->
        <div class="slide" id="slide-8">
            <div class="slide-content">
                <img id="img-8" src="jointure-8.png" alt="Exemple INNER JOIN">
            </div>
        </div>

        <!-- Diapo 9 -->
        <div class="slide" id="slide-9">
            <div class="slide-content">
                <img id="img-9" src="jointure-9.png" alt="Exemple RIGHT JOIN">
            </div>
        </div>

        <!-- Diapo 10 -->
        <div class="slide" id="slide-10">
            <div class="slide-content">
                <img id="img-10" src="jointure-10.png" alt="Exemple LEFT JOIN">
            </div>
        </div>

        <!-- Diapo 11 -->
        <div class="slide" id="slide-11">
            <div class="slide-content">
                <img id="img-11" src="jointure-11.png" alt="Exemple CROSS JOIN">
            </div>
        </div>

    </div>

    <!-- Navigation en haut à droite -->
    <div class="navigation">
        <button onclick="prevSlide()" class="nav-btn" title="Précédent">←</button>
        <div class="slide-counter" id="counter">1 / 11</div>
        <button onclick="nextSlide()" class="nav-btn" title="Suivant">→</button>
    </div>

    <!-- Barre de progression en haut -->
    <div class="progress">
        <div id="progress-bar" class="progress-bar" style="width: 9.09%;"></div>
    </div>

    <script>
        let currentSlide = 0;
        const totalSlides = 11;
        const slides = document.querySelectorAll('.slide');

        function updateUI() {
            document.getElementById('counter').innerHTML = 
                `<strong>${currentSlide + 1}</strong> / ${totalSlides}`;
            
            const progress = ((currentSlide + 1) / totalSlides) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function showSlide(n) {
            slides.forEach(slide => slide.classList.remove('active'));
            slides[n].classList.add('active');
            currentSlide = n;
            updateUI();
        }

        function nextSlide() {
            let next = currentSlide + 1;
            if (next >= totalSlides) next = 0;
            showSlide(next);
        }

        function prevSlide() {
            let prev = currentSlide - 1;
            if (prev < 0) prev = totalSlides - 1;
            showSlide(prev);
        }

        // Navigation clavier
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });

        // Swipe sur mobile
        let touchStartX = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 70) nextSlide();
            if (touchEndX > touchStartX + 70) prevSlide();
        });

        // Clic sur l'image pour passer à la diapo suivante
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') {
                nextSlide();
            }
        });

        // Initialisation
        window.onload = () => {
            updateUI();
            console.log('%c✅ Présentation Les Jointures chargée avec succès !', 'color:#ef4444; font-size:16px;');
        };
    </script>
</body>
</html>
